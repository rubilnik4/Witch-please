project {
  host = "0.0.0.0"
  port = 8080
}

publish {
  maxPastTime = "5 minutes"
  maxFutureTime = "90 days",
  maxCardOfDayDelay = "8 hours"
  tick = "10 second"
  lookAhead = "5 second"
  batchLimit = 20
}

jwt {
  secret = "12345678"
  expirationMinutes = 60
}

telemetry {
  appName = "witch-core"
  otelEndpoint = "http://localhost:4317"
  prometheusPort = 9464
  logLevel = "DEBUG"
}

cache {
  priceExpiration = "30 seconds"
}

telegram {
  token = "test-telegram-token"
}

storage {
  type = "local"

  local {
    path = "/tmp/witch-please"
  }
}
